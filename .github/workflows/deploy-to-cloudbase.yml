name: Deploy to CloudBase

on:
  push:
    branches: [ main ]
  # 手动触发部署
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deployment reason'
        required: false
        default: 'Manual deployment'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # 检出完整历史以便后续操作
        fetch-depth: 0
    
    - name: Setup Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Verify CloudBase configuration
      run: |
        echo "Checking CloudBase configuration..."
        if [ ! -f "cloudbaserc.json" ]; then
          echo "❌ cloudbaserc.json not found!"
          exit 1
        fi
        echo "✅ cloudbaserc.json found"
        
        # 检查环境ID配置
        ENV_ID=$(grep -o '"envId": *"[^"]*"' cloudbaserc.json | cut -d'"' -f4)
        if [ -z "$ENV_ID" ]; then
          echo "❌ envId not found in cloudbaserc.json"
          exit 1
        fi
        echo "✅ Environment ID: $ENV_ID"
    
    - name: Prepare deployment directory
      run: |
        echo "Preparing deployment directory..."
        
        # 如果deploy目录不存在，创建它
        if [ ! -d "deploy" ]; then
          mkdir deploy
        fi
        
        # 复制必要文件到deploy目录
        echo "Copying essential files to deploy directory..."
        
        # 复制主HTML文件
        if [ -f "anki学习系统.html" ]; then
          cp "anki学习系统.html" deploy/
          echo "✅ Copied anki学习系统.html"
        else
          echo "❌ anki学习系统.html not found!"
          exit 1
        fi
        
        # 复制数据文件
        if [ -f "cards_data.json" ]; then
          cp cards_data.json deploy/
          echo "✅ Copied cards_data.json"
        else
          echo "❌ cards_data.json not found!"
          exit 1
        fi
        
        # 复制CloudBase配置
        if [ -f "cloudbaserc.json" ]; then
          cp cloudbaserc.json deploy/
          echo "✅ Copied cloudbaserc.json"
        fi
        
        # 创建或更新index.html重定向文件
        echo '<!DOCTYPE html>' > deploy/index.html
        echo '<html lang="zh-CN">' >> deploy/index.html
        echo '<head>' >> deploy/index.html
        echo '    <meta charset="UTF-8">' >> deploy/index.html
        echo '    <meta name="viewport" content="width=device-width, initial-scale=1.0">' >> deploy/index.html
        echo '    <title>Anki学习系统 - 重定向</title>' >> deploy/index.html
        echo '    <meta http-equiv="refresh" content="0; url=anki学习系统.html">' >> deploy/index.html
        echo '    <script>' >> deploy/index.html
        echo '        // JavaScript重定向作为备用' >> deploy/index.html
        echo '        window.location.href = "anki学习系统.html";' >> deploy/index.html
        echo '    </script>' >> deploy/index.html
        echo '</head>' >> deploy/index.html
        echo '<body>' >> deploy/index.html
        echo '    <p>正在重定向到Anki学习系统... 如果未自动跳转，请<a href="anki学习系统.html">点击这里</a>。</p>' >> deploy/index.html
        echo '</body>' >> deploy/index.html
        echo '</html>' >> deploy/index.html
        echo "✅ Created/updated index.html redirect file"
        
        # 显示deploy目录内容
        echo "Deploy directory contents:"
        ls -la deploy/
    
    - name: Login to CloudBase with API Key
      env:
        CLOUDBASE_ENVID: ${{ secrets.CLOUDBASE_ENVID }}
        CLOUDBASE_SECRETID: ${{ secrets.CLOUDBASE_SECRETID }}
        CLOUDBASE_SECRETKEY: ${{ secrets.CLOUDBASE_SECRETKEY }}
      run: |
        echo "📦 Logging in to CloudBase with API Key..."
        echo "==================================================="
        
        # 检查必要的secret是否已配置
        if [ -z "$CLOUDBASE_ENVID" ] || [ -z "$CLOUDBASE_SECRETID" ] || [ -z "$CLOUDBASE_SECRETKEY" ]; then
          echo "❌ CloudBase secrets not configured!"
          echo "Please configure the following secrets in GitHub:"
          echo "  - CLOUDBASE_ENVID"
          echo "  - CLOUDBASE_SECRETID"
          echo "  - CLOUDBASE_SECRETKEY"
          exit 1
        fi
        
        echo "Environment variables:"
        echo "CLOUDBASE_ENVID: $CLOUDBASE_ENVID"
        echo "CLOUDBASE_SECRETID: $CLOUDBASE_SECRETID"
        echo "CLOUDBASE_SECRETKEY: [HIDDEN]"
        
        # 清理可能的缓存或临时登录状态
        echo "Cleaning up any previous CloudBase session..."
        rm -rf ~/.cloudbase || true
        
        # 使用腾讯云API密钥登录，添加重试逻辑
        MAX_RETRIES=3
        RETRY_COUNT=0
        LOGIN_SUCCESS=false
        
        while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$LOGIN_SUCCESS" = "false" ]; do
          RETRY_COUNT=$((RETRY_COUNT + 1))
          echo "Attempting CloudBase login (try $RETRY_COUNT of $MAX_RETRIES)..."
          
          # 设置超时和重试延迟
          timeout 30s npx cloudbase login --apiKeyId "$CLOUDBASE_SECRETID" --apiKey "$CLOUDBASE_SECRETKEY" 2>&1 | tee login.log
          LOGIN_EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $LOGIN_EXIT_CODE -eq 0 ]; then
            LOGIN_SUCCESS=true
            echo "✅ CloudBase login successful"
          else
            echo "⚠️  CloudBase login failed (exit code: $LOGIN_EXIT_CODE)"
            
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "Retrying in 5 seconds..."
              sleep 5
            fi
          fi
        done
        
        if [ "$LOGIN_SUCCESS" = "false" ]; then
          echo "❌ Failed to login to CloudBase after $MAX_RETRIES attempts"
          echo "Login log:"
          cat login.log 2>/dev/null || true
          exit 1
        fi
        
        # 验证登录成功
        echo "Verifying login and environment access..."
        if timeout 15s npx cloudbase env:list 2>/dev/null | grep -q "$CLOUDBASE_ENVID"; then
          echo "✅ Successfully logged in to CloudBase and found environment: $CLOUDBASE_ENVID"
          echo "Available environments:"
          timeout 10s npx cloudbase env:list 2>/dev/null || echo "Cannot list environments"
        else
          echo "❌ Failed to verify CloudBase login or environment not found"
          echo "Trying to list all environments:"
          timeout 10s npx cloudbase env:list 2>/dev/null || echo "Cannot list environments"
          
          # 即使环境列表失败，也可能可以部署（尝试继续）
          echo "⚠️  Continuing with deployment attempt..."
        fi
    
    - name: Deploy to CloudBase with retry
      id: deploy
      run: |
        echo "🚀 Deploying to CloudBase environment: ${{ secrets.CLOUDBASE_ENVID }}"
        echo "==================================================="
        
        DEPLOY_ENVID="${{ secrets.CLOUDBASE_ENVID }}"
        
        if [ -z "$DEPLOY_ENVID" ]; then
          echo "❌ CloudBase environment ID not set"
          exit 1
        fi
        
        # 部署到CloudBase，添加重试逻辑
        MAX_DEPLOY_RETRIES=3
        DEPLOY_RETRY_COUNT=0
        DEPLOY_SUCCESS=false
        
        while [ $DEPLOY_RETRY_COUNT -lt $MAX_DEPLOY_RETRIES ] && [ "$DEPLOY_SUCCESS" = "false" ]; do
          DEPLOY_RETRY_COUNT=$((DEPLOY_RETRY_COUNT + 1))
          echo "Deployment attempt $DEPLOY_RETRY_COUNT of $MAX_DEPLOY_RETRIES..."
          
          # 检查deploy目录是否存在且包含文件
          if [ ! -d "deploy" ]; then
            echo "❌ Deploy directory not found"
            exit 1
          fi
          
          echo "Deploy directory contents:"
          ls -la deploy/
          
          echo "Deploying files:"
          find deploy/ -type f | head -20
          
          # 执行部署，设置超时
          echo "Running deployment command..."
          DEPLOY_OUTPUT=$(timeout 120s npx cloudbase hosting:deploy deploy/ -e "$DEPLOY_ENVID" --verbose 2>&1)
          DEPLOY_EXIT_CODE=$?
          
          echo "$DEPLOY_OUTPUT"
          
          if [ $DEPLOY_EXIT_CODE -eq 0 ]; then
            if echo "$DEPLOY_OUTPUT" | grep -q -i "success\|successful\|deployed\|完成\|成功"; then
              DEPLOY_SUCCESS=true
              echo "✅ Deployment completed successfully!"
              
              # 提取部署信息
              echo "$DEPLOY_OUTPUT" | grep -E "(URL|网址|访问|access|hosting):" | head -5
            else
              echo "⚠️  Deployment command succeeded but output doesn't contain success indicators"
              DEPLOY_SUCCESS=true  # 即使没有成功指示符也视为成功
              echo "✅ Deployment completed (assuming success)"
            fi
          else
            echo "❌ Deployment failed (exit code: $DEPLOY_EXIT_CODE)"
            
            if [ $DEPLOY_RETRY_COUNT -lt $MAX_DEPLOY_RETRIES ]; then
              echo "Retrying in 10 seconds..."
              sleep 10
              
              # 清理可能的状态
              echo "Cleaning up before retry..."
              rm -rf ~/.cloudbase/session* 2>/dev/null || true
            fi
          fi
        done
        
        if [ "$DEPLOY_SUCCESS" = "false" ]; then
          echo "❌ Failed to deploy after $MAX_DEPLOY_RETRIES attempts"
          echo "Deployment logs:"
          echo "$DEPLOY_OUTPUT"
          exit 1
        fi
    
    - name: Verify deployment
      run: |
        echo "Verifying deployment..."
        
        # 获取环境ID
        ENV_ID=$(grep -o '"envId": *"[^"]*"' cloudbaserc.json | cut -d'"' -f4)
        
        # 构造部署URL
        DEPLOY_URL="https://${ENV_ID}-1256169472.tcloudbaseapp.com"
        
        echo "Testing deployment URL: $DEPLOY_URL"
        
        # 测试主页面可访问性
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL")
        
        if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ] || [ "$HTTP_STATUS" = "301" ]; then
          echo "✅ Deployment verified! HTTP Status: $HTTP_STATUS"
          echo "🌐 Website is live at: $DEPLOY_URL"
        else
          echo "⚠️  Deployment might have issues. HTTP Status: $HTTP_STATUS"
          echo "Trying to fetch more details..."
          curl -I "$DEPLOY_URL" || true
          # 不因验证失败而终止工作流，只记录警告
        fi
        
        # 测试应用页面
        APP_URL="${DEPLOY_URL}/anki学习系统.html"
        APP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL")
        
        if [ "$APP_STATUS" = "200" ]; then
          echo "✅ Application page accessible: $APP_URL"
        else
          echo "⚠️  Application page returned HTTP $APP_STATUS"
        fi